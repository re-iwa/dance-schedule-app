<!DOCTYPE html>
<html>
<head>
    <title>編集</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">

<h3>編集</h3>

<form method="POST">

<input type="date" name="date" value="{{ schedule.date }}">

<select name="time">
{% for t in times %}
<option value="{{ t }}" {% if t==schedule.time %}selected{% endif %}>{{ t }}</option>
{% endfor %}
</select>

<select name="genre">
{% for g in genres %}
<option value="{{ g }}" {% if g==schedule.genre %}selected{% endif %}>{{ g }}</option>
{% endfor %}
</select>

{#
<select name="event">
{% for e in events %}
<option value="{{ e }}" {% if e==schedule.event %}selected{% endif %}>{{ e }}</option>
{% endfor %}
</select>
#}

<select name="place">
{% for p in places %}
<option value="{{ p }}" {% if p==schedule.place %}selected{% endif %}>{{ p }}</option>
{% endfor %}
</select>

{#
<input type="text" name="name" value="{{ schedule.name }}">
#}

<button class="btn btn-success">保存</button>

</form>

</div>
</body>
</html>
